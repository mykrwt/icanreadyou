<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26; --border: #2a2a3a;
    --accent: #7c6aff; --accent2: #ff6a9b; --text: #e8e8f0; --muted: #7070a0;
    --success: #4ade80; --danger: #f87171;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 620px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  .logo { font-size: 10px; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.4rem; font-family: 'Space Mono', monospace; }
  h1 { font-size: 38px; font-weight: 800; line-height: 1.1; }
  h1 span { color: var(--accent); }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 10px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--text); font-family: 'Space Mono', monospace; }
  .stat-val.hi { color: var(--accent); }
  .stat-lbl { font-size: 9px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.1em; font-family: 'Space Mono', monospace; }

  .acc-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .acc-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s; width: 0%; }

  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 9px; font-size: 12px; font-weight: 700; font-family: 'Space Mono', monospace; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; color: var(--muted); transition: all 0.2s; text-align: center; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* TRAIN */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1rem; }
  .choice-btn {
    padding: 1.75rem 1rem; font-size: 48px; font-weight: 800;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    cursor: pointer; transition: all 0.12s; text-align: center; color: var(--text);
    font-family: 'Space Mono', monospace; width: 100%;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .choice-btn.picked { border: 2px solid var(--accent); background: rgba(124,106,255,0.12); color: var(--accent); }
  .choice-btn.not-picked { opacity: 0.25; }
  .choice-btn:disabled { cursor: default; transform: none; }

  .result-msg { text-align: center; padding: 0.8rem 1rem; border-radius: 10px; font-size: 13px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .result-correct { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.25); color: var(--success); }
  .result-wrong { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); color: var(--danger); }
  .result-neutral { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

  /* TEST */
  .unlock-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .unlock-title { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
  .unlock-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
  .unlock-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s; }
  .unlock-label { font-size: 13px; font-weight: 700; color: var(--text); font-family: 'Space Mono', monospace; }

  .test-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .test-input-wrap label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: 'Space Mono', monospace; margin-bottom: 6px; }
  .test-input {
    width: 100%; padding: 14px; font-size: 32px; font-weight: 800;
    font-family: 'Space Mono', monospace; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; color: var(--text);
    text-align: center; outline: none; transition: border-color 0.2s;
  }
  .test-input:focus { border-color: var(--accent); }

  .action-btn {
    width: 100%; padding: 0.9rem; font-size: 14px; font-weight: 700;
    font-family: 'Space Mono', monospace; background: var(--accent); border: none;
    border-radius: 10px; cursor: pointer; color: #fff; transition: all 0.2s; margin-bottom: 1rem;
  }
  .action-btn:hover { opacity: 0.85; }
  .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .algo-result { background: var(--surface); border: 2px solid var(--accent); border-radius: 14px; padding: 1.5rem; text-align: center; display: none; }
  .algo-result-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-family: 'Space Mono', monospace; margin-bottom: 6px; }
  .algo-result-num { font-size: 64px; font-weight: 800; color: var(--accent); font-family: 'Space Mono', monospace; line-height: 1; }
  .algo-result-why { font-size: 11px; color: var(--muted); margin-top: 8px; font-family: 'Space Mono', monospace; }
  .err { color: var(--danger); font-size: 11px; font-family: 'Space Mono', monospace; margin-bottom: 0.75rem; display: none; }

  /* PATTERNS */
  .patterns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .pat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
  .pat-name { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-family: 'Space Mono', monospace; margin-bottom: 10px; }
  .pat-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
  .pat-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }
  .pat-bar.green { background: var(--success); }
  .pat-bar.pink { background: var(--accent2); }
  .pat-val { font-size: 22px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--text); }
  .pat-sub { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }

  .end-digits { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
  .end-digits-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-family: 'Space Mono', monospace; margin-bottom: 12px; }
  .digits-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .digit-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; text-align: center; min-width: 44px; transition: all 0.3s; }
  .digit-chip.hot { border-color: var(--accent); background: rgba(124,106,255,0.15); }
  .digit-chip-num { font-size: 16px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--text); }
  .digit-chip-pct { font-size: 9px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .history-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
  .history-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-family: 'Space Mono', monospace; margin-bottom: 10px; }
  .history-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .hchip { font-size: 11px; font-family: 'Space Mono', monospace; padding: 3px 7px; background: var(--surface2); border-radius: 5px; color: var(--muted); border: 1px solid var(--border); }
  .hchip.recent { color: var(--accent); border-color: rgba(124,106,255,0.4); }

  .no-data { text-align: center; padding: 2rem; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Pattern Learning Algorithm v1.1</div>
    <h1>Mind <span>Reader</span></h1>
  </header>

  <div class="stats-row">
    <div class="stat"><div class="stat-val hi" id="s-picks">0</div><div class="stat-lbl">Picks</div></div>
    <div class="stat"><div class="stat-val" id="s-correct">0</div><div class="stat-lbl">Correct</div></div>
    <div class="stat"><div class="stat-val" id="s-accuracy">—</div><div class="stat-lbl">Accuracy</div></div>
    <div class="stat"><div class="stat-val" id="s-streak">0</div><div class="stat-lbl">Streak</div></div>
  </div>
  <div class="acc-bar"><div class="acc-fill" id="acc-fill"></div></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('train')">Train</div>
    <div class="tab" onclick="switchTab('test')">Test</div>
    <div class="tab" onclick="switchTab('patterns')">Patterns</div>
  </div>

  <!-- TRAIN -->
  <div class="panel active" id="panel-train">
    <div class="choices">
      <button class="choice-btn" id="btn-a" onclick="pick('a')">—</button>
      <button class="choice-btn" id="btn-b" onclick="pick('b')">—</button>
    </div>
    <div id="result-area"></div>
  </div>

  <!-- TEST -->
  <div class="panel" id="panel-test">
    <div class="unlock-box" id="unlock-box">
      <div class="unlock-title">Training progress — 10 picks needed to unlock</div>
      <div class="unlock-bar-wrap"><div class="unlock-bar" id="unlock-bar" style="width:0%"></div></div>
      <div class="unlock-label" id="unlock-label">0 / 10</div>
    </div>
    <div class="test-inputs">
      <div class="test-input-wrap">
        <label>Number 1</label>
        <input class="test-input" id="test-a" type="number" min="1" max="99" maxlength="2" placeholder="12">
      </div>
      <div class="test-input-wrap">
        <label>Number 2</label>
        <input class="test-input" id="test-b" type="number" min="1" max="99" maxlength="2" placeholder="87">
      </div>
    </div>
    <div class="err" id="test-err">Enter two different numbers (1–99)</div>
    <button class="action-btn" id="test-btn" onclick="runTest()">Algorithm, choose →</button>
    <div class="algo-result" id="algo-result">
      <div class="algo-result-lbl">Algorithm picks</div>
      <div class="algo-result-num" id="algo-num">?</div>
      <div class="algo-result-why" id="algo-why"></div>
    </div>
  </div>

  <!-- PATTERNS -->
  <div class="panel" id="panel-patterns">
    <div id="patterns-content"></div>
  </div>
</div>

<script>
const B = {
  picks: 0, correct: 0, streak: 0,
  history: [],
  higherC: 0, lowerC: 0,
  oddC: 0, evenC: 0,
  endDigits: {},
  ranges: { low: 0, mid: 0, high: 0 },
  lastPick: null,
  lastPred: null,
  curA: 0, curB: 0,
  busy: false
};

const MIN_ROUNDS = 10;

function ri(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function getRange(n) { return n <= 33 ? 'low' : n <= 66 ? 'mid' : 'high'; }

function scoreNum(n, other) {
  let score = 0; const reasons = [];
  const tHL = B.higherC + B.lowerC;
  if (tHL > 0) {
    const hb = B.higherC / tHL;
    score += (n > other ? hb : 1 - hb) * 4;
    if (n > other && hb > 0.6) reasons.push('you prefer higher numbers');
    if (n < other && hb < 0.4) reasons.push('you prefer lower numbers');
  }
  const tOE = B.oddC + B.evenC;
  if (tOE > 0) {
    const ob = B.oddC / tOE;
    const isOdd = n % 2 !== 0;
    score += (isOdd ? ob : 1 - ob) * 3;
    if (isOdd && ob > 0.65) reasons.push('you lean odd');
    if (!isOdd && ob < 0.35) reasons.push('you lean even');
  }
  const tR = B.ranges.low + B.ranges.mid + B.ranges.high;
  if (tR > 0) {
    const r = getRange(n);
    score += (B.ranges[r] / tR) * 3;
    const top = Object.entries(B.ranges).sort((a,b)=>b[1]-a[1])[0];
    if (top[0] === r && top[1]/tR > 0.5) reasons.push(`you pick ${r} range numbers`);
  }
  const eT = Object.values(B.endDigits).reduce((s,v)=>s+v,0);
  if (eT > 0) {
    const ek = String(n % 10);
    score += ((B.endDigits[ek] || 0) / eT) * 2.5;
    const topE = Object.entries(B.endDigits).sort((a,b)=>b[1]-a[1])[0];
    if (topE && topE[0] === ek && topE[1]/eT > 0.3) reasons.push(`you like numbers ending in ${topE[0]}`);
  }
  return { score, reason: reasons[0] || 'pattern analysis' };
}

function predict(a, b) {
  if (B.picks < MIN_ROUNDS) return null;
  const sa = scoreNum(a, b), sb = scoreNum(b, a);
  return sa.score >= sb.score
    ? { pick: a, reason: sa.reason }
    : { pick: b, reason: sb.reason };
}

function learn(picked, other) {
  if (picked > other) B.higherC++; else B.lowerC++;
  if (picked % 2 !== 0) B.oddC++; else B.evenC++;
  B.ranges[getRange(picked)]++;
  const ek = String(picked % 10);
  B.endDigits[ek] = (B.endDigits[ek] || 0) + 1;
  B.lastPick = picked;
  B.history.push(picked);
}

function updateStats() {
  document.getElementById('s-picks').textContent = B.picks;
  document.getElementById('s-correct').textContent = B.correct;
  document.getElementById('s-streak').textContent = B.streak;
  const eligible = Math.max(B.picks - MIN_ROUNDS + 1, 0);
  if (eligible > 0) {
    const acc = Math.min(Math.round(B.correct / eligible * 100), 100);
    document.getElementById('s-accuracy').textContent = acc + '%';
    document.getElementById('acc-fill').style.width = acc + '%';
  }
  updateUnlockBar();
}

function updateUnlockBar() {
  const pct = Math.min(Math.round(B.picks / MIN_ROUNDS * 100), 100);
  const bar = document.getElementById('unlock-bar');
  const lbl = document.getElementById('unlock-label');
  const box = document.getElementById('unlock-box');
  const btn = document.getElementById('test-btn');
  if (!bar || !lbl) return;
  bar.style.width = pct + '%';
  if (B.picks >= MIN_ROUNDS) {
    lbl.textContent = `✓ Unlocked — ${B.picks} picks done`;
    if (box) box.style.borderColor = 'rgba(74,222,128,0.35)';
    if (btn) btn.disabled = false;
  } else {
    lbl.textContent = `${B.picks} / ${MIN_ROUNDS} — ${MIN_ROUNDS - B.picks} more to unlock`;
    if (btn) btn.disabled = true;
  }
}

function pick(side) {
  if (B.busy) return;
  B.busy = true;

  const btnA = document.getElementById('btn-a');
  const btnB = document.getElementById('btn-b');
  if (!btnA || !btnB) { B.busy = false; return; }

  btnA.disabled = true;
  btnB.disabled = true;

  const picked = side === 'a' ? B.curA : B.curB;
  const other  = side === 'a' ? B.curB : B.curA;

  btnA.className = 'choice-btn ' + (side === 'a' ? 'picked' : 'not-picked');
  btnB.className = 'choice-btn ' + (side === 'b' ? 'picked' : 'not-picked');

  const wasCorrect = B.lastPred !== null && B.lastPred === picked;
  if (B.lastPred !== null) {
    B.picks++;
    if (wasCorrect) { B.correct++; B.streak++; } else { B.streak = 0; }
  } else {
    B.picks++;
  }

  learn(picked, other);
  updateStats();

  const ra = document.getElementById('result-area');
  if (ra) {
    if (B.lastPred !== null) {
      ra.innerHTML = wasCorrect
        ? `<div class="result-msg result-correct">✓ Predicted ${B.lastPred} — correct!</div>`
        : `<div class="result-msg result-wrong">✗ Predicted ${B.lastPred}, you picked ${picked}</div>`;
    } else {
      ra.innerHTML = `<div class="result-msg result-neutral">Picked ${picked} · ${Math.max(MIN_ROUNDS - B.picks, 0)} more to start predicting</div>`;
    }
  }

  setTimeout(() => {
    B.busy = false;
    nextRound();
  }, 900);
}

function nextRound() {
  let a, b;
  do { a = ri(10, 99); b = ri(10, 99); } while (a === b);
  B.curA = a; B.curB = b;

  const res = predict(a, b);
  B.lastPred = res ? res.pick : null;

  const btnA = document.getElementById('btn-a');
  const btnB = document.getElementById('btn-b');
  if (!btnA || !btnB) return;

  btnA.textContent = a; btnA.className = 'choice-btn'; btnA.disabled = false;
  btnB.textContent = b; btnB.className = 'choice-btn'; btnB.disabled = false;

  const ra = document.getElementById('result-area');
  if (ra) ra.innerHTML = '';
}

function runTest() {
  const aVal = parseInt(document.getElementById('test-a').value);
  const bVal = parseInt(document.getElementById('test-b').value);
  const errEl = document.getElementById('test-err');
  const resBox = document.getElementById('algo-result');

  if (isNaN(aVal) || isNaN(bVal) || aVal === bVal || aVal < 1 || bVal < 1 || aVal > 99 || bVal > 99) {
    if (errEl) errEl.style.display = 'block';
    if (resBox) resBox.style.display = 'none';
    return;
  }
  if (errEl) errEl.style.display = 'none';

  const res = predict(aVal, bVal);
  if (!res || !resBox) return;
  resBox.style.display = 'block';
  const numEl = document.getElementById('algo-num');
  const whyEl = document.getElementById('algo-why');
  if (numEl) numEl.textContent = res.pick;
  if (whyEl) whyEl.textContent = '// ' + res.reason;
}

function renderPatterns() {
  const content = document.getElementById('patterns-content');
  if (!content) return;

  if (B.picks < 5) {
    content.innerHTML = `<div class="no-data">// train at least 5 rounds to see patterns</div>`;
    return;
  }

  const tHL = B.higherC + B.lowerC;
  const tOE = B.oddC + B.evenC;
  const tR  = B.ranges.low + B.ranges.mid + B.ranges.high;
  const hPct = tHL > 0 ? Math.round(B.higherC / tHL * 100) : 50;
  const oPct = tOE > 0 ? Math.round(B.oddC / tOE * 100) : 50;
  const topRange = Object.entries(B.ranges).sort((a,b)=>b[1]-a[1])[0];
  const topRangePct = tR > 0 ? Math.round(topRange[1] / tR * 100) : 0;
  const rangeLabel = { low: '10–33', mid: '34–66', high: '67–99' };

  const eT = Object.values(B.endDigits).reduce((s,v)=>s+v,0);
  const digits = Array.from({length:10},(_,i)=>({d:i,c:B.endDigits[String(i)]||0}));
  const maxD = Math.max(...digits.map(x=>x.c), 1);

  const recent = B.history.slice(-20).reverse();

  content.innerHTML = `
    <div class="patterns-grid">
      <div class="pat-card">
        <div class="pat-name">Higher vs Lower</div>
        <div class="pat-bar-wrap"><div class="pat-bar" style="width:${hPct}%"></div></div>
        <div class="pat-val">${hPct}%</div>
        <div class="pat-sub">${hPct > 55 ? 'picks higher' : hPct < 45 ? 'picks lower' : 'balanced'} · ${tHL} picks</div>
      </div>
      <div class="pat-card">
        <div class="pat-name">Odd vs Even</div>
        <div class="pat-bar-wrap"><div class="pat-bar pink" style="width:${oPct}%"></div></div>
        <div class="pat-val">${oPct}%</div>
        <div class="pat-sub">${oPct > 55 ? 'prefers odd' : oPct < 45 ? 'prefers even' : 'balanced'} · ${tOE} picks</div>
      </div>
      <div class="pat-card">
        <div class="pat-name">Range preference</div>
        <div class="pat-bar-wrap"><div class="pat-bar green" style="width:${topRangePct}%"></div></div>
        <div class="pat-val">${topRangePct}%</div>
        <div class="pat-sub">${topRange[0]} range (${rangeLabel[topRange[0]]})</div>
      </div>
      <div class="pat-card">
        <div class="pat-name">Total picks</div>
        <div class="pat-bar-wrap"><div class="pat-bar" style="width:${Math.min(B.picks/50*100,100)}%"></div></div>
        <div class="pat-val">${B.picks}</div>
        <div class="pat-sub">best streak: ${B.streak} · accuracy: ${B.picks >= MIN_ROUNDS ? document.getElementById('s-accuracy').textContent : 'unlock at 10'}</div>
      </div>
    </div>

    <div class="end-digits">
      <div class="end-digits-title">Ending digits — how often you pick numbers ending in 0–9</div>
      <div class="digits-row">
        ${digits.map(({d,c}) => {
          const pct = eT > 0 ? Math.round(c/eT*100) : 0;
          const hot = c === maxD && c > 0;
          return `<div class="digit-chip${hot?' hot':''}">
            <div class="digit-chip-num">${d}</div>
            <div class="digit-chip-pct">${pct}%</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="history-row">
      <div class="history-title">Last 20 picks</div>
      <div class="history-chips">
        ${recent.length === 0
          ? '<span style="color:var(--muted);font-size:12px;font-family:\'Space Mono\',monospace">no picks yet</span>'
          : recent.map((n,i) => `<span class="hchip${i<3?' recent':''}">${n}</span>`).join('')}
      </div>
    </div>
  `;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['train','test','patterns'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-' + tab);
  if (panel) panel.classList.add('active');
  if (tab === 'patterns') renderPatterns();
  if (tab === 'test') updateUnlockBar();
}

document.querySelectorAll('.test-input').forEach(inp => {
  inp.addEventListener('input', () => {

  });
});
